services:
  configurator:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    build: .
    pull_policy: build
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - "-c"
    command:
      - >
        set -e;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -g default_site $$SITE_NAME;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
    environment:
      SITE_NAME: "${SITE_NAME}"
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: "redis-cache:6379"
      REDIS_QUEUE: "redis-queue:6379"
      SOCKETIO_PORT: "9000"
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"

  create-site:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    deploy:
      restart_policy:
        condition: none
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    environment:
      SITE_NAME: "${SITE_NAME}"
      ADMIN_PASSWORD: "${SERVICE_PASSWORD_ADMIN}"
      DB_ROOT_PASSWORD: "${SERVICE_PASSWORD_DB}"
    entrypoint:
      - bash
      - "-c"
    command:
      - >
        set -e;
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        until grep -q '"db_host"' sites/common_site_config.json 2>/dev/null; do
          echo "Waiting for configurator...";
          sleep 5;
        done;
        if [ ! -d "sites/$${SITE_NAME}" ]; then
          bench new-site "$${SITE_NAME}" \
            --mariadb-user-host-login-scope='%' \
            --admin-password="$${ADMIN_PASSWORD}" \
            --db-root-username=root \
            --db-root-password="$${DB_ROOT_PASSWORD}" \
            --install-app erpnext \
            --set-default;
        fi;
        for app in erpnext hrms crm telephony helpdesk india_compliance; do
          if ! bench --site "$${SITE_NAME}" list-apps | grep -qx "$$app"; then
            echo "Installing missing app: $$app";
            bench --site "$${SITE_NAME}" install-app "$$app";
          fi;
        done;
        bench --site "$${SITE_NAME}" migrate;
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  backend:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    depends_on:
      create-site:
        condition: service_completed_successfully
      configurator:
        condition: service_completed_successfully

  frontend:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: "backend:8000"
      SOCKETIO: "websocket:9000"
      FRAPPE_SITE_NAME_HEADER: "${SITE_NAME}"
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.frappe-router.rule=HostRegexp(`^.+\.igris\.studio$`) || HostRegexp(`^.+\.shopishvara\.com$`)'
      - traefik.http.routers.frappe-router.entryPoints=https
      - traefik.http.routers.frappe-router.tls=true
      - traefik.http.routers.frappe-router.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=8080
    ports:
      - "0.0.0.0:8081:8080"
    depends_on:
      - backend
      - websocket

  websocket:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    environment:
      FRAPPE_REDIS_CACHE: "redis://redis-cache:6379"
      FRAPPE_REDIS_QUEUE: "redis://redis-queue:6379"
    depends_on:
      create-site:
        condition: service_completed_successfully
      configurator:
        condition: service_completed_successfully

  queue-short:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    command:
      - bench
      - worker
      - "--queue"
      - "short,default"
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    depends_on:
      create-site:
        condition: service_completed_successfully
      configurator:
        condition: service_completed_successfully

  queue-long:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    command:
      - bench
      - worker
      - "--queue"
      - "long,default,short"
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    depends_on:
      create-site:
        condition: service_completed_successfully
      configurator:
        condition: service_completed_successfully

  scheduler:
    image: "${FRAPPE_IMAGE:-frappe-custom:v16.15.0}"
    pull_policy: never
    command:
      - bench
      - schedule
    volumes:
      - "sites-v3:/home/frappe/frappe-bench/sites"
      - "logs-v3:/home/frappe/frappe-bench/logs"
    depends_on:
      create-site:
        condition: service_completed_successfully
      configurator:
        condition: service_completed_successfully

  db:
    image: "mariadb:11.8"
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--skip-character-set-client-handshake"
    environment:
      MYSQL_ROOT_PASSWORD: "${SERVICE_PASSWORD_DB}"
      MARIADB_ROOT_PASSWORD: "${SERVICE_PASSWORD_DB}"
    volumes:
      - "db-data-v3:/var/lib/mysql"
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - "--connect"
        - "--innodb_initialized"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis-cache:
    image: "redis:6.2-alpine"

  redis-queue:
    image: "redis:6.2-alpine"
    volumes:
      - "redis-queue-data:/data"

volumes:
  db-data-v3: null
  redis-queue-data: null
  sites-v3: null
  logs-v3: null
